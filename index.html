<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGEL GARMS — Premium Y2K Archive & Resell</title>
    <style>
        /* --- Y2K GLAM DESIGN SYSTEM --- */
        :root {
            --baby-pink: #ffb7d5;
            --barbie-pink: #ff4793;
            --cherry-pink: #c2004d;
            --soft-white: #fff9fb;
            --angel-blue: #e3f2fd;
            --font-display: 'Georgia', serif;
            --font-body: 'Helvetica Neue', Arial, sans-serif;
        }

        /* --- GLOBAL STYLE & SCROLLBAR --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-body);
            background-color: var(--soft-white);
            color: #1a1a1a;
            background-image: 
                radial-gradient(rgba(255, 183, 213, 0.3) 15%, transparent 16%),
                radial-gradient(rgba(255, 71, 147, 0.15) 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        /* --- TICKER MARQUEE --- */
        .ticker {
            background-color: var(--barbie-pink);
            color: white;
            padding: 10px 0;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: 2px solid var(--cherry-pink);
        }
        .ticker-wrap {
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
        .ticker-item {
            display: inline-block;
            padding-right: 50px;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            background: rgba(255, 249, 251, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 71, 147, 0.2);
            padding: 20px;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }
        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
        }
        
        /* THE LOGO */
        .logo-area {
            text-align: center;
            cursor: pointer;
        }
        .logo-wings {
            font-size: 24px;
            color: var(--barbie-pink);
            display: inline-block;
            vertical-align: middle;
        }
        .logo-text {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            color: var(--cherry-pink);
            display: inline-block;
            margin: 0 5px;
            text-shadow: 1px 1px 0px var(--baby-pink);
        }

        /* RESPONSIVE SHOPPING CART BUTTON */
        .cart-btn {
            background: none;
            border: none;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            color: var(--cherry-pink);
            transition: transform 0.2s ease;
        }
        .cart-btn:hover {
            transform: scale(1.1);
        }
        .cart-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .cart-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background-color: var(--barbie-pink);
            color: white;
            font-size: 10px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(255, 71, 147, 0.4);
        }

        /* --- PAGES CONTROLLER WRAPPERS --- */
        .page-view {
            display: none; /* Controlled via JavaScript dynamic router */
        }
        .page-view.active-view {
            display: block;
        }

        /* --- HERO SECTION --- */
        .hero {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }
        .hero-sparkle-tag {
            color: var(--barbie-pink);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        .hero h1 {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 400;
            line-height: 1.2;
            color: #000;
            margin-bottom: 25px;
        }
        .hero h1 span {
            color: var(--barbie-pink);
            font-style: italic;
            font-weight: 700;
        }
        .hero p {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 35px;
        }
        .hero-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .btn-glass {
            display: inline-block;
            background: var(--barbie-pink);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(255, 71, 147, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-glass:hover {
            transform: translateY(-2px);
            background-color: var(--cherry-pink);
        }
        .hero-image-wrap {
            position: relative;
            text-align: center;
        }
        .hero-main-img {
            width: 100%;
            max-width: 400px;
            height: 480px;
            border-radius: 40px;
            border: 6px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        /* --- CLASSIFIED GRID CATALOG --- */
        .catalog {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 20px;
        }
        .catalog-header {
            margin-bottom: 40px;
            border-bottom: 2px solid var(--baby-pink);
            padding-bottom: 15px;
        }
        .catalog-title {
            font-family: var(--font-display);
            font-size: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        .item-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(255, 71, 147, 0.1);
        }
        .item-img-container {
            width: 100%;
            height: 300px;
            background-color: var(--angel-blue);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
        }
        .item-brand {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--barbie-pink);
            font-weight: 700;
        }
        .item-name {
            font-family: var(--font-display);
            font-size: 15px;
            margin: 3px 0;
        }
        .item-price {
            font-weight: 700;
            color: var(--cherry-pink);
        }

        /* --- PRODUCT SEPARATE DETAIL PAGE UI --- */
        .product-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
        }
        .product-gallery {
            text-align: center;
        }
        .main-product-img-frame {
            width: 100%;
            max-width: 450px;
            height: 520px;
            background-color: var(--angel-blue);
            border-radius: 24px;
            border: 6px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 110px;
        }
        .product-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .back-link {
            text-decoration: none;
            color: var(--barbie-pink);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: inline-block;
